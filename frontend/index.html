<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Career Guidance Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="background-gradients">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                </svg>
                <h1>CareerGuide AI</h1>
            </div>
            <div class="sdg-badge">SDG 4: Quality Education</div>
        </header>

        <main class="chat-container">
            <div id="chat-messages" class="chat-messages">
                <div class="message system-message">
                    <div class="message-avatar">AI</div>
                    <div class="message-content">
                        <p>Hello! I am your AI Career Guidance Assistant. I can help you explore career paths, recommend
                            learning resources, and analyze the skills you need for your dream job. How can I help you
                            today?</p>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <textarea id="user-input" placeholder="E.g., I want to become a Machine Learning Engineer..."
                    rows="1"></textarea>
                <button id="send-btn" class="send-btn" disabled>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/script.js"></script>
</body>

</html>
